<script>

  {id:"412",name:"Torta tal-Lampuki FFRIŻATA x2",d:"2 pax",c:"Torti",p:6.95},
  {id:"407",name:"Torta tal-Lampuki x3",d:"3 pax",c:"Torti",p:19.95},
  {id:"406",name:"Torta tal-Lampuki x4",d:"4 pax",c:"Torti",p:25.95},
  {id:"453",name:"Torta tal-Pastard x4",d:"4 pax",c:"Torti",p:14.5},
  {id:"409",name:"Torta tal-Qargħa u r-Ross FFRIŻATA x1",d:"1 pax",c:"Torti",p:1.95},
  {id:"413",name:"Torta tal-Qargħa u r-Ross FFRIŻATA x2",d:"2 pax",c:"Torti",p:5.4},
  {id:"410",name:"Torta tal-Qargħa u r-Ross FFRIŻATA x3",d:"2 pax",c:"Torti",p:8.75},
  {id:"404",name:"Torta tal-Qargħa u r-Ross x4",d:"4 pax",c:"Torti",p:18.45},
  {id:"1001",name:"Brokkli",d:"",c:"Ħaxix",p:0},
  {id:"1002",name:"Merqtux",d:"",c:"Ħaxix",p:0},
  {id:"1003",name:"Pastard",d:"",c:"Ħaxix",p:0},
  {id:"1004",name:"Piżelli",d:"",c:"Ħaxix",p:0},
  {id:"1005",name:"Qargħa Ħamra",d:"",c:"Ħaxix",p:0},
  {id:"1101",name:"Klamari",d:"",c:"Ħut",p:0},
  {id:"1102",name:"Qarnit",d:"",c:"Ħut",p:0},
  {id:"1103",name:"Salamun",d:"",c:"Ħut",p:0},
  {id:"1201",name:"Ċanga - Fillet",d:"",c:"Laħam",p:0},
  {id:"1202",name:"Fenek",d:"",c:"Laħam",p:0},
  {id:"1203",name:"Ħaruf ta' Barra",d:"",c:"Laħam",p:0},
  {id:"1204",name:"Ħaruf ta' Għawdex",d:"",c:"Laħam",p:0},
  {id:"1205",name:"Ikkapuljat",d:"",c:"Laħam",p:0},
  {id:"1206",name:"Majjal - Fillet",d:"",c:"Laħam",p:0},
  {id:"1207",name:"Majjal - Spalla",d:"",c:"Laħam",p:0},
  {id:"1208",name:"Tiġieġa - Koxox",d:"",c:"Laħam",p:0},
  {id:"1209",name:"Tiġieġa - Sħieħa",d:"",c:"Laħam",p:0},
  {id:"1210",name:"Vitella",d:"",c:"Laħam",p:0},
];
const FZ=[
  {id:1,n:"Freezer 1",col:"#1A56DB",bg:"#E1EFFE",dk:"#1e429f"},
  {id:2,n:"Freezer 2",col:"#0E9F6E",bg:"#DEF7EC",dk:"#03543f"},
  {id:3,n:"Freezer 3",col:"#D97706",bg:"#FEF3C7",dk:"#92400e"},
  {id:4,n:"Fridge",col:"#9333EA",bg:"#F3E8FF",dk:"#6b21a8"},
];
const CC={Dessert:{bg:"#FCE7F3",tc:"#9D174D"},Ftajjar:{bg:"#FFF7ED",tc:"#C2410C"},Pasta:{bg:"#FEFCE8",tc:"#854D0E"},Torti:{bg:"#FFFBEB",tc:"#78350F"},"Ħaxix":{bg:"#DCFCE7",tc:"#166534"},"Ħut":{bg:"#CFFAFE",tc:"#0E7490"},"Laħam":{bg:"#FEE2E2",tc:"#991B1B"}};
const ING=new Set(["Ħaxix","Ħut","Laħam"]);
const VER="v2.0 · April 2026";

let prods=[...PI],stock={},notes={},hist=[],thresholds={},lastUpd={};
let uiSrch="",uiCat="All",uiTab="stock",uiFz=null;
let modal=null;

function lsGet(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
function load(){
  const s=lsGet("lk_s");if(s)stock=s;
  const p=lsGet("lk_p");if(p)prods=p;
  const n=lsGet("lk_n");if(n)notes=n;
  const h=lsGet("lk_h");if(Array.isArray(h))hist=h;
  const t=lsGet("lk_t");if(t)thresholds=t;
  const u=lsGet("lk_u");if(u)lastUpd=u;
  draw();
}
function sv(){lsSet("lk_s",stock);lsSet("lk_p",prods);lsSet("lk_n",notes);lsSet("lk_h",hist);lsSet("lk_t",thresholds);lsSet("lk_u",lastUpd);}

const euro=n=>`€${Number(n).toFixed(2)}`;
const fdate=ts=>new Date(ts).toLocaleDateString("en-GB",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"});
function relTime(ts){
  const d=Date.now()-ts,m=Math.floor(d/60000);
  if(m<2)return"just now";if(m<60)return`${m}m ago`;
  const h=Math.floor(m/60);if(h<24)return`${h}h ago`;
  const dy=Math.floor(h/24);if(dy===1)return"yesterday";if(dy<7)return`${dy}d ago`;
  return new Date(ts).toLocaleDateString("en-GB",{day:"2-digit",month:"short"});
}
const gq=(pid,fid)=>stock[pid]?.[fid]??0;
const gt=pid=>Object.values(stock[pid]??{}).reduce((a,b)=>a+b,0);
const dynCats=()=>[...new Set(prods.map(p=>p.c))];
const totVal=()=>{let v=0;for(const[pid,f]of Object.entries(stock)){const pr=prods.find(x=>x.id===pid);if(pr?.p)v+=Object.values(f).reduce((a,b)=>a+b,0)*pr.p;}return v;};
const fzItems=fid=>Object.entries(stock).filter(([,f])=>(f[fid]??0)>0).length;
const isLow=pid=>{const t=thresholds[pid];return t>0&&gt(pid)>0&&gt(pid)<=t;};
const lowCount=()=>prods.filter(p=>isLow(p.id)).length;

function addLog(type,pname,qty,from,to){if(!Array.isArray(hist))hist=[];hist.unshift({id:Date.now(),type,pname:pname||"",qty:qty||0,from:from||"",to:to||"",ts:Date.now()});hist=hist.slice(0,300);}

function setQ(pid,fid,qty){
  const old=gq(pid,fid);
  if(!stock[pid])stock[pid]={};
  if(qty<=0)delete stock[pid][fid];else stock[pid][fid]=qty;
  if(!Object.keys(stock[pid]??{}).length)delete stock[pid];
  const d=qty-old;
  if(d!==0){const pr=prods.find(p=>p.id===pid);addLog(d>0?'add':'remove',pr?.name,Math.abs(d),FZ.find(f=>f.id===fid)?.n,null);lastUpd[pid]=Date.now();}
  sv();draw();if(modal?.pid===pid)openDetail(pid);
}
function addS(pid,fid,qty){
  if(!stock[pid])stock[pid]={};stock[pid][fid]=(stock[pid][fid]??0)+qty;
  const pr=prods.find(p=>p.id===pid);addLog('add',pr?.name,qty,FZ.find(f=>f.id===fid)?.n,null);
  lastUpd[pid]=Date.now();sv();closeM();draw();
}
function doTx(pid,from,to,qty){
  const av=gq(pid,from);const act=Math.min(qty,av);if(!act)return;
  if(!stock[pid])stock[pid]={};
  stock[pid][from]=(stock[pid][from]??0)-act;if(stock[pid][from]<=0)delete stock[pid][from];
  stock[pid][to]=(stock[pid][to]??0)+act;
  if(!Object.keys(stock[pid]??{}).length)delete stock[pid];
  const pr=prods.find(p=>p.id===pid);addLog('transfer',pr?.name,act,FZ.find(f=>f.id===from)?.n,FZ.find(f=>f.id===to)?.n);
  lastUpd[pid]=Date.now();sv();closeM();draw();
}
function zeroP(pid){const pr=prods.find(p=>p.id===pid);addLog('purge',pr?.name,gt(pid),'all',null);delete stock[pid];sv();closeM();draw();}
function purgeAll(){addLog('purge','All products',0,'all',null);stock={};sv();closeM();draw();}
function setNote(pid,v){notes[pid]=v;sv();}
function setThreshold(pid,v){const n=parseInt(v)||0;if(n<=0)delete thresholds[pid];else thresholds[pid]=n;sv();}
function importP(arr){
  const ids=new Set(prods.map(p=>p.id));const add=arr.filter(p=>!ids.has(p.id));
  prods=[...prods,...add];if(add.length)addLog('import',add.length+' products',add.length,null,null);
  sv();closeM();draw();
}
function exportCSV(){
  const rows=[['ID','Name','Category',...FZ.map(f=>f.n),'Total','Value (€)']];
  for(const p of prods){const tot=gt(p.id);if(!tot)continue;rows.push([p.id,p.name,p.c,...FZ.map(f=>gq(p.id,f.id)),tot,p.p>0?(tot*p.p).toFixed(2):0]);}
  const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  a.href=url;a.download=`stock_${new Date().toISOString().slice(0,10)}.csv`;a.click();URL.revokeObjectURL(url);
}

function setTab(t){uiTab=t;draw();}
function toggleFz(fid){uiFz=(uiFz===fid?null:fid);drawMain();}

function draw(){
  document.getElementById('totval').textContent=euro(totVal());
  const ts=document.getElementById('tbstock'),th=document.getElementById('tbhist');
  ts.style.cssText=`padding:5px 12px;border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;background:${uiTab==='stock'?'#C4472A':'#F5F1EC'};color:${uiTab==='stock'?'#fff':'#8B7E74'}`;
  th.style.cssText=`padding:5px 12px;border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;background:${uiTab==='history'?'#C4472A':'#F5F1EC'};color:${uiTab==='history'?'#fff':'#8B7E74'}`;
  drawSb();uiTab==='stock'?drawMain():drawHist();
}

function drawSb(){
  const cs=dynCats(),lc=lowCount();
  let h=`<div class="sb-hd">Categories</div>`;
  h+=`<button class="cb${uiCat==='All'?' on':''}" onclick="uiCat='All';uiFz=null;drawMain()"><span>All</span><span style="font-size:10px;color:#8B7E74">${prods.length}</span></button>`;
  for(const c of cs){const ing=ING.has(c),n=prods.filter(p=>p.c===c).length;h+=`<button class="cb${ing?' ing':''}${uiCat===c?' on':''}" onclick="uiCat=${JSON.stringify(c)};uiFz=null;drawMain()"><span>${c}</span><span style="font-size:10px;color:#8B7E74">${n}</span></button>`;}
  h+=`<div class="sb-hd" style="margin-top:4px">Storage</div>`;
  for(const f of FZ){const items=fzItems(f.id),sel=uiFz===f.id;h+=`<div class="fzrow${sel?' on':''}" onclick="toggleFz(${f.id})"><span><span class="fzdot" style="background:${f.col}"></span>${f.n}</span><span style="font-size:10px">${items} items</span></div>`;}
  if(lc>0)h+=`<button class="low-alert" onclick="showLowStock()">⚠ ${lc} low stock item${lc>1?'s':''}</button>`;
  h+=`<div class="sb-acts">`;
  h+=`<button class="abt" style="background:#C4472A;color:#fff" onclick="openAdd()">+ Add Stock</button>`;
  h+=`<button class="abt" style="background:#EDE8E1;color:#1C1511" onclick="exportCSV()">Export CSV</button>`;
  h+=`<button class="abt" style="background:#EDE8E1;color:#8B7E74" onclick="openImport()">Import CSV</button>`;
  h+=`<button class="abt" style="background:#FEF2F2;color:#991B1B" onclick="openPurge()">Reset All</button>`;
  h+=`</div><div class="ver">${VER}</div>`;
  document.getElementById('sb').innerHTML=h;
}

function showLowStock(){uiCat='All';uiFz=null;uiSrch='';drawMain();setTimeout(()=>{const mn=document.getElementById('mn');if(mn)mn.scrollTop=0;},50);}

function drawMain(){
  const s=uiSrch.toLowerCase().trim(),cs=dynCats();
  let inStock,noStock;
  if(uiFz){
    inStock=prods.filter(p=>{if(uiCat!=='All'&&p.c!==uiCat)return false;if(s&&!p.name.toLowerCase().includes(s))return false;return gq(p.id,uiFz)>0;});
    noStock=[];
  }else{
    const filtered=prods.filter(p=>{if(uiCat!=='All'&&p.c!==uiCat)return false;if(s&&!p.name.toLowerCase().includes(s)&&!p.id.includes(s))return false;return true;});
    inStock=filtered.filter(p=>gt(p.id)>0);
    noStock=filtered.filter(p=>gt(p.id)===0);
  }
  let h=`<div class="mob-top"><div class="mob-cats"><button class="mcat${uiCat==='All'?' on':''}" onclick="uiCat='All';uiFz=null;drawMain()">All</button>`;
  for(const c of cs){const ing=ING.has(c);h+=`<button class="mcat${ing?' ing':''}${uiCat===c?' on':''}" onclick="uiCat=${JSON.stringify(c)};uiFz=null;drawMain()">${c}</button>`;}
  h+=`</div><div class="mob-acts"><button class="mabt" style="background:#C4472A;color:#fff" onclick="openAdd()">+ Add Stock</button><button class="mabt" style="background:#EDE8E1;color:#1C1511" onclick="exportCSV()">Export</button><button class="mabt" style="background:#FEF2F2;color:#991B1B" onclick="openPurge()">Reset</button></div></div>`;
  if(uiFz){const f=FZ.find(x=>x.id===uiFz);h+=`<div class="fz-banner" style="background:${f.bg};border:1px solid ${f.col}33"><span style="color:${f.dk}"><span class="fzdot" style="background:${f.col}"></span>${f.n} — ${inStock.length} item${inStock.length!==1?'s':''}</span><button onclick="uiFz=null;drawMain()" style="background:none;border:none;cursor:pointer;font-size:16px;color:${f.dk};font-weight:700;line-height:1">×</button></div>`;}
  h+=`<div class="srch-wrap"><span class="sic">🔍</span><input class="srch" id="si" placeholder="Search for a product..." value="${uiSrch.replace(/"/g,'&quot;')}" oninput="uiSrch=this.value;drawMain()"></div>`;
  if(uiFz){h+=`<div class="meta"><strong>${inStock.length} items</strong> in ${FZ.find(x=>x.id===uiFz)?.n}</div>`;}
  else if(s||uiCat!=='All'){h+=`<div class="meta">${inStock.length+noStock.length} results · <strong>${inStock.length} in stock</strong></div>`;}
  else{h+=`<div class="meta"><strong>${inStock.length} items in stock</strong> · ${prods.length} total products</div>`;}
  if(!inStock.length&&!s&&uiCat==='All'&&!uiFz){h+=`<div style="text-align:center;padding:60px 20px;color:#8B7E74"><div style="font-size:40px;margin-bottom:10px">🧊</div><div style="font-weight:700;font-size:15px">No stock yet</div><div style="font-size:12px;margin-top:4px">Use "+ Add Stock" to get started</div></div>`;}
  if(!inStock.length&&uiFz&&!s){h+=`<div style="text-align:center;padding:40px 20px;color:#8B7E74"><div style="font-size:32px;margin-bottom:8px">🧊</div><div style="font-weight:700">Nothing stored here yet</div></div>`;}
  for(const p of inStock)h+=prow(p,false);
  if(!uiFz&&(s||uiCat!=='All')&&noStock.length){h+=`<div class="sec-hd">Not in stock (${noStock.length})</div>`;for(const p of noStock)h+=prow(p,true);}
  document.getElementById('mn').innerHTML=h;
  const si=document.getElementById('si');if(si&&document.activeElement!==si){si.focus();si.setSelectionRange(si.value.length,si.value.length);}
}

function prow(p,ns){
  const cc=CC[p.c]||{bg:'#F3F4F6',tc:'#374151'};
  const ing=ING.has(p.c),tot=gt(p.id),nt=notes[p.id],low=isLow(p.id),lu=lastUpd[p.id];
  let cls='pr';if(ing)cls+=' ing';else if(low)cls+=' low-row';if(ns)cls+=' ns';
  let h=`<div class="${cls}" onclick="openDetail('${p.id}')">`;
  h+=`<div class="pr-top"><div><div class="pname">${p.name}</div>`;
  if(p.d||p.p>0)h+=`<div class="psub">${p.d}${p.p>0?` · ${euro(p.p)}/unit`:''}</div>`;
  h+=`</div><div style="display:flex;gap:5px;align-items:center;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end">`;
  if(low)h+=`<span class="low-bdg">⚠ Low</span>`;
  h+=`<span class="bdg" style="background:${cc.bg};color:${cc.tc}">${p.c}</span>`;
  if(tot>0)h+=`<span style="font-size:11px;font-weight:800;white-space:nowrap">${tot} total</span>`;
  h+=`</div></div>`;
  if(!ns&&tot>0){
    h+=`<div class="pills">`;
    const fzShow=uiFz?FZ.filter(f=>f.id===uiFz):FZ;
    for(const f of fzShow){const q=gq(p.id,f.id);if(!q)continue;h+=`<span class="pill" style="background:${f.bg};color:${f.dk}">${f.n}: ${q}<button class="prm" onclick="event.stopPropagation();setQ('${p.id}',${f.id},${q-1})" style="color:${f.dk}" title="Remove 1">−</button></span>`;}
    h+=`</div>`;
  }else if(ns){h+=`<div style="font-size:11px;color:#8B7E74;font-style:italic">Not in stock — click to add</div>`;}
  if(nt)h+=`<div class="pnote">${nt}</div>`;
  if(lu&&tot>0)h+=`<div class="upd-ts">Updated ${relTime(lu)}</div>`;
  h+=`</div>`;return h;
}

function drawHist(){
  const LS={add:{bg:"#DEF7EC",tc:"#03543f",lb:"Added"},remove:{bg:"#FEE2E2",tc:"#991B1B",lb:"Removed"},transfer:{bg:"#E1EFFE",tc:"#1e429f",lb:"Transferred"},purge:{bg:"#FEF3C7",tc:"#92400E",lb:"Purged"},import:{bg:"#F3E8FF",tc:"#6b21a8",lb:"Imported"}};
  let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><span style="font-size:12px;font-weight:700;color:#8B7E74">${hist.length} events</span>`;
  if(hist.length)h+=`<button onclick="if(confirm('Clear history?')){hist=[];sv();draw();}" style="font-size:11px;color:#991B1B;background:#FEF2F2;padding:4px 9px;border-radius:7px;border:none;cursor:pointer;font-family:inherit">Clear</button>`;
  h+=`</div>`;
  if(!hist.length){h+=`<div style="text-align:center;padding:60px 20px;color:#8B7E74"><div style="font-size:32px;margin-bottom:8px">📋</div><div style="font-weight:700">No activity yet</div></div>`;}
  for(const e of hist){
    const ls=LS[e.type]||{bg:'#F3F4F6',tc:'#374151',lb:e.type};
    h+=`<div class="hr"><div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px"><div><div style="display:flex;gap:5px;align-items:center;margin-bottom:3px"><span class="hbdg" style="background:${ls.bg};color:${ls.tc}">${ls.lb}</span>`;
    if(e.qty>0)h+=`<span style="font-size:11px;font-weight:700">${e.qty} unit${e.qty!==1?'s':''}</span>`;
    h+=`</div><div style="font-size:12px;font-weight:700">${e.pname}</div>`;
    if(e.type==='transfer')h+=`<div style="font-size:10px;color:#8B7E74;margin-top:2px">${e.from} → ${e.to}</div>`;
    else if(e.from)h+=`<div style="font-size:10px;color:#8B7E74;margin-top:2px">${e.from}</div>`;
    h+=`</div><div style="font-size:10px;color:#8B7E74;white-space:nowrap;flex-shrink:0">${fdate(e.ts)}</div></div></div>`;
  }
  document.getElementById('mn').innerHTML=h;
}

function showM(html){document.getElementById('md').innerHTML=html;document.getElementById('ov').classList.add('show');}
function closeM(){modal=null;document.getElementById('ov').classList.remove('show');}
document.getElementById('ov').addEventListener('click',function(e){if(e.target===this)closeM();});

function openDetail(pid){
  modal={type:'detail',pid};
  const p=prods.find(x=>x.id===pid);if(!p)return;
  const tot=gt(pid),cc=CC[p.c]||{bg:'#F3F4F6',tc:'#374151'};
  let h=`<div class="mhnd"></div><div class="mtitle">${p.name}</div>`;
  h+=`<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:10px;font-size:11px;color:#8B7E74">`;
  if(p.d)h+=`<span>${p.d}</span>`;
  h+=`<span class="bdg" style="background:${cc.bg};color:${cc.tc}">${p.c}</span>`;
  if(p.p>0)h+=`<span style="color:#C4472A;font-weight:700">${euro(p.p)}/unit</span>`;
  h+=`</div>`;
  if(tot>0){h+=`<div style="display:flex;gap:8px;margin-bottom:13px"><span style="background:#F3EDE8;border-radius:7px;padding:4px 10px;font-size:11px;font-weight:700">${tot} units total</span>`;if(p.p>0)h+=`<span style="background:#FFF0EC;border-radius:7px;padding:4px 10px;font-size:11px;font-weight:700;color:#C4472A">${euro(tot*p.p)}</span>`;h+=`</div>`;}
  for(const f of FZ){
    const q=gq(pid,f.id),has=q>0;
    h+=`<div class="dfz" style="background:${has?f.bg:'#F9F6F2'};border:1.5px solid ${has?f.col:'#EDE8E1'}">`;
    h+=`<div><div style="font-size:12px;font-weight:700;color:${has?f.dk:'#8B7E74'}">${f.n}</div>`;
    h+=`<div style="font-size:10px;color:${has?f.col:'#8B7E74'}">${has?`${q} unit${q!==1?'s':''}${p.p>0?` · ${euro(q*p.p)}`:''}` :'Empty'}</div></div>`;
    h+=`<div style="display:flex;align-items:center;gap:5px">`;
    if(has)h+=`<button onclick="openTx('${pid}',${f.id})" style="padding:3px 9px;font-size:10px;font-weight:700;border-radius:6px;background:transparent;border:1.5px solid ${f.col};color:${f.dk};cursor:pointer;font-family:inherit;white-space:nowrap">Transfer</button>`;
    h+=`<button class="mini" style="background:#F3EDE8;color:#1C1511" onclick="setQ('${pid}',${f.id},${q-1})">−</button>`;
    h+=`<span style="font-size:16px;font-weight:800;color:${has?f.col:'#8B7E74'};min-width:26px;text-align:center">${q}</span>`;
    h+=`<button class="mini" style="background:${f.col};color:#fff" onclick="setQ('${pid}',${f.id},${q+1})">+</button>`;
    h+=`</div></div>`;
  }
  h+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px;margin-bottom:10px">`;
  h+=`<div><label class="lbl">Notes</label><textarea class="fi" style="margin-bottom:0" rows="2" placeholder="e.g. Batch 28 Mar" onblur="setNote('${pid}',this.value)">${notes[pid]||''}</textarea></div>`;
  h+=`<div><label class="lbl">Low stock alert (units)</label><input class="fi" style="margin-bottom:0" type="number" min="0" placeholder="0 = off" value="${thresholds[pid]||''}" onchange="setThreshold('${pid}',this.value)"></div>`;
  h+=`</div>`;
  h+=`<button class="sb2" onclick="closeM();draw()">Done</button>`;
  if(tot>0)h+=`<div style="text-align:center;margin-top:8px"><button onclick="if(confirm('Zero all stock for this item?')){zeroP('${pid}')}" style="background:none;border:none;cursor:pointer;font-family:inherit;font-size:11px;color:#C4B5A8;text-decoration:underline">zero all stock for this product</button></div>`;
  showM(h);
}

function openAdd(){modal={type:'add',step:1,pid:null,fid:null,qty:1,srch:''};renderAdd();}
function renderAdd(){
  const m=modal;
  let h=`<div class="mhnd"></div><div class="mtitle">Add to Stock</div>`;
  if(m.step===1){
    const list=prods.filter(p=>!m.srch||p.name.toLowerCase().includes(m.srch.toLowerCase())).slice(0,50);
    h+=`<input class="fi" id="asrch" placeholder="Search product..." value="${m.srch}" oninput="modal.srch=this.value;renderAdd()">`;
    if(list.length){
      h+=`<div class="srch-list">`;
      for(const p of list){const cc=CC[p.c]||{bg:'#F3F4F6',tc:'#374151'};h+=`<div class="srow${m.pid===p.id?' on':''}" onclick="modal.pid='${p.id}';modal.step=2;renderAdd()"><span style="font-weight:700">${p.name}</span> <span class="bdg" style="background:${cc.bg};color:${cc.tc};margin-left:4px">${p.c}</span>${p.p>0?` <span style="font-size:10px;color:#8B7E74;margin-left:4px">${euro(p.p)}</span>`:''}</div>`;}
      h+=`</div>`;
    }else if(m.srch){
      h+=`<div style="text-align:center;padding:20px 10px;color:#8B7E74">`;
      h+=`<div style="font-size:13px;margin-bottom:12px">No product found for "<strong>${m.srch}</strong>"</div>`;
      h+=`<button onclick="openAddProd(modal.srch)" style="padding:10px 18px;border-radius:9px;background:#C4472A;color:#fff;border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700">+ Add "${m.srch}" as new product</button>`;
      h+=`</div>`;
    }
  }else{
    const p=prods.find(x=>x.id===m.pid);
    h+=`<div style="padding:9px 12px;border-radius:9px;background:#FFF0EC;margin-bottom:14px"><div style="font-size:13px;font-weight:700;color:#C4472A">${p?.name}</div><div style="font-size:10px;color:#8B7E74;margin-top:2px">${p?.d}${p?.p>0?` · ${euro(p.p)}`:''}</div></div>`;
    h+=`<label class="lbl">Storage unit</label><div class="fzgrid">`;
    for(const f of FZ){const sel=m.fid===f.id;h+=`<button class="fzo" style="${sel?`border-color:${f.col};background:${f.bg};color:${f.dk}`:''}" onclick="modal.fid=${f.id};renderAdd()">${f.n}<br><span style="font-size:10px;opacity:.7">has ${gq(m.pid,f.id)}</span></button>`;}
    h+=`</div><label class="lbl">Quantity</label>`;
    h+=`<div class="qc"><button class="qbtn" style="background:#F3EDE8;color:#1C1511" onclick="if(modal.qty>1){modal.qty--;renderAdd()}">−</button><input class="qi" type="number" value="${m.qty}" min="1" onchange="modal.qty=Math.max(1,parseInt(this.value)||1);renderAdd()"><button class="qbtn" style="background:#C4472A;color:#fff" onclick="modal.qty++;renderAdd()">+</button></div>`;
    h+=`<button class="pb" ${!m.fid?'disabled':''} onclick="addS('${m.pid||''}',modal.fid,modal.qty)">Add to Stock</button>`;
    h+=`<button class="sb2" onclick="modal.step=1;renderAdd()">← Change Product</button>`;
  }
  showM(h);const asi=document.getElementById('asrch');if(asi)asi.focus();
}

function openAddProd(name){
  modal={type:'addprod',name:name||'',desc:'',cat:dynCats()[0]||'Other',price:''};renderAddProd();
}
function selectAPCat(c){
  modal.cat=c;
  document.querySelectorAll('.ap-cat').forEach(b=>{
    const bc=b.getAttribute('data-c');
    const ing=ING.has(bc);
    const on=bc===c;
    b.className='tag ap-cat'+(on?' on':'');
    if(ing){b.style.borderColor=on?'#16a34a':'#EDE8E1';b.style.background=on?'#DCFCE7':'';b.style.color=on?'#166534':'';}
  });
}
function submitAddProd(){
  const nm=document.getElementById('ap-n').value.trim();
  if(!nm){document.getElementById('ap-n').focus();return;}
  const newP={id:'c_'+Date.now(),name:nm,d:document.getElementById('ap-d').value.trim()||'',c:modal.cat,p:parseFloat(document.getElementById('ap-p').value)||0};
  prods=[...prods,newP];sv();
  modal={type:'add',step:2,pid:newP.id,fid:null,qty:1,srch:''};renderAdd();
}
function renderAddProd(){
  const m=modal;const cats=dynCats();
  let h=`<div class="mhnd"></div><div class="mtitle">Add New Product</div>`;
  h+=`<label class="lbl">Name</label><input class="fi" id="ap-n" value="" placeholder="Product name">`;
  h+=`<label class="lbl">Description</label><input class="fi" id="ap-d" value="" placeholder="e.g. 4 pax">`;
  h+=`<label class="lbl">Price (€)</label><input class="fi" id="ap-p" type="number" value="" placeholder="0.00">`;
  h+=`<label class="lbl">Category</label><div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px">`;
  for(const c of cats){
    const ing=ING.has(c);const on=m.cat===c;
    h+=`<button class="tag ap-cat${on?' on':''}" data-c="${c}" onclick="selectAPCat('${c}')" style="${ing?(on?'border-color:#16a34a;background:#DCFCE7;color:#166534':'border-color:#16a34a'):''}'">${c}</button>`;
  }
  h+=`</div>`;
  h+=`<button class="pb" onclick="submitAddProd()">Add Product & Continue</button>`;
  h+=`<button class="sb2" onclick="modal={type:'add',step:1,pid:null,fid:null,qty:1,srch:''};renderAdd()">← Back to Search</button>`;
  showM(h);
  setTimeout(()=>{
    const n=document.getElementById('ap-n');
    if(n){
      n.value=m.name||'';
      n.focus();
      n.setSelectionRange(n.value.length,n.value.length);
    }
    const d=document.getElementById('ap-d');if(d)d.value=m.desc||'';
    const p=document.getElementById('ap-p');if(p)p.value=m.price||'';
  },30);
}

function openTx(pid,fromFid){modal={type:'tx',pid,fromFid,toFid:null,qty:1};renderTx();}
function renderTx(){
  const m=modal,p=prods.find(x=>x.id===m.pid);
  const fz=FZ.find(f=>f.id===m.fromFid),avail=gq(m.pid,m.fromFid);
  let h=`<div class="mhnd"></div><div class="mtitle">Transfer Stock</div>`;
  h+=`<div style="font-size:12px;color:#8B7E74;margin-bottom:12px">${p?.name}</div>`;
  h+=`<div style="background:${fz?.bg};border-radius:9px;padding:9px 12px;margin-bottom:13px"><div style="font-size:10px;font-weight:700;color:${fz?.dk}">FROM: ${fz?.n}</div><div style="font-size:11px;color:${fz?.col};margin-top:1px">${avail} available</div></div>`;
  h+=`<label class="lbl">To</label><div class="fzgrid" style="grid-template-columns:1fr 1fr 1fr">`;
  for(const f of FZ.filter(f=>f.id!==m.fromFid)){const sel=m.toFid===f.id;h+=`<button class="fzo" style="${sel?`border-color:${f.col};background:${f.bg};color:${f.dk}`:''}" onclick="modal.toFid=${f.id};renderTx()">${f.n}</button>`;}
  h+=`</div><label class="lbl">Quantity</label>`;
  h+=`<div class="qc"><button class="qbtn" style="background:#F3EDE8;color:#1C1511" onclick="if(modal.qty>1){modal.qty--;renderTx()}">−</button><input class="qi" type="number" value="${m.qty}" min="1" max="${avail}" onchange="modal.qty=Math.min(${avail},Math.max(1,parseInt(this.value)||1));renderTx()"><button class="qbtn" style="background:#C4472A;color:#fff" onclick="if(modal.qty<${avail}){modal.qty++;renderTx()}">+</button></div>`;
  h+=`<button class="pb" ${!m.toFid?'disabled':''} onclick="doTx('${m.pid}',${m.fromFid},modal.toFid,modal.qty)">Transfer</button>`;
  h+=`<button class="sb2" onclick="closeM();openDetail('${m.pid}')">Cancel</button>`;
  showM(h);
}

function openImport(){
  let h=`<div class="mhnd"></div><div class="mtitle">Import Products (CSV)</div>`;
  h+=`<div style="background:#F5F1EC;border-radius:9px;padding:10px 12px;font-size:11px;color:#8B7E74;margin-bottom:12px;line-height:1.7">Expected columns: <strong style="color:#1C1511">ID, NAME, DESCRIPTION, CATEGORY, Price</strong><br>Duplicate IDs are skipped automatically.</div>`;
  h+=`<button onclick="document.getElementById('csvf').click()" style="width:100%;padding:12px;border-radius:10px;border:2px dashed #EDE8E1;background:#fff;color:#8B7E74;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:10px">Choose CSV File</button>`;
  h+=`<input type="file" id="csvf" accept=".csv" style="display:none" onchange="handleCSV(this)"><div id="imprev"></div><button class="sb2" onclick="closeM()">Cancel</button>`;
  showM(h);
}
function handleCSV(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    const lines=ev.target.result.trim().split(/\r?\n/),res=[];
    for(let i=1;i<lines.length;i++){const cols=[];let cur='',q=false;for(const ch of lines[i]){if(ch==='"')q=!q;else if(ch===','&&!q){cols.push(cur.trim());cur='';}else cur+=ch;}cols.push(cur.trim());if(cols.length>=2&&cols[1])res.push({id:cols[0]||'i'+i,name:cols[1],d:cols[2]||'',c:cols[3]||'Other',p:parseFloat(cols[4])||0});}
    if(!res.length){document.getElementById('imprev').innerHTML=`<div style="color:#991B1B;font-size:12px;padding:8px;background:#FEF2F2;border-radius:7px">No valid rows found.</div>`;return;}
    let h=`<div style="font-size:11px;font-weight:700;color:#8B7E74;margin-bottom:6px">${res.length} products found</div><div class="imp-list">`;
    for(const p of res.slice(0,12))h+=`<div class="imp-row"><strong>${p.name}</strong> <span style="color:#8B7E74">· ${p.c}${p.p>0?` · ${euro(p.p)}`:''}</span></div>`;
    if(res.length>12)h+=`<div style="font-size:10px;color:#8B7E74;padding:5px 10px">...and ${res.length-12} more</div>`;
    h+=`</div><button class="pb" onclick='importP(${JSON.stringify(res)})'>Import ${res.length} Products</button>`;
    document.getElementById('imprev').innerHTML=h;
  };r.readAsText(f);
}

function openPurge(){
  let h=`<div class="mhnd"></div><div class="mtitle">Reset All Stock</div>`;
  h+=`<div class="warn">This will zero all quantities across all storage units. The product catalogue is not affected and this cannot be undone.</div>`;
  h+=`<label style="display:flex;align-items:center;gap:10px;margin-bottom:16px;cursor:pointer"><input type="checkbox" id="pconf" style="width:16px;height:16px"><span style="font-size:13px;font-weight:600">I understand — reset all quantities to zero</span></label>`;
  h+=`<button class="pb" id="pbtn" style="background:#991B1B" disabled onclick="purgeAll()">Reset All Stock</button><button class="sb2" onclick="closeM()">Cancel</button>`;
  showM(h);document.getElementById('pconf').onchange=function(){document.getElementById('pbtn').disabled=!this.checked;};
}

load();
</script>
