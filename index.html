<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kċina ta' Luċija — Stock Manager</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;font-size:14px;color:#1C1511;background:#F8F5F0;min-height:100vh}
.hdr{background:#fff;border-bottom:1px solid #EDE8E1;padding:10px 20px;display:flex;justify-content:space-between;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.wrap{display:flex;min-height:calc(100vh - 53px)}
.sb{width:190px;flex-shrink:0;background:#fff;border-right:1px solid #EDE8E1;padding:12px 8px;display:flex;flex-direction:column;gap:1px;overflow-y:auto}
.mn{flex:1;padding:16px 20px;min-width:0}
.sb-hd{font-size:9px;font-weight:700;color:#8B7E74;letter-spacing:.06em;padding:10px 8px 3px;text-transform:uppercase}
.cb{width:100%;text-align:left;padding:6px 9px;border-radius:7px;border:none;background:none;cursor:pointer;font-size:12px;font-weight:600;color:#1C1511;font-family:inherit;display:flex;justify-content:space-between;align-items:center}
.cb:hover{background:#F5F1EC}.cb.on{background:#F8EEF3;color:#9B1048}
.cb.ing{color:#15803d}.cb.ing.on{background:#DCFCE7;color:#15803d}
.fzrow{padding:6px 9px;font-size:12px;color:#8B7E74;display:flex;justify-content:space-between;align-items:center;border-radius:7px;cursor:pointer;font-weight:600}
.fzrow:hover{background:#F5F1EC;color:#1C1511}
.fzrow.on{background:#F5F1EC;color:#1C1511;font-weight:700}
.fzdot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:middle}
.sb-acts{margin-top:auto;padding-top:10px;border-top:1px solid #EDE8E1;display:flex;flex-direction:column;gap:5px}
.abt{width:100%;padding:7px 9px;font-size:12px;font-weight:700;border-radius:7px;border:none;cursor:pointer;font-family:inherit;text-align:left}
.low-alert{margin:8px 8px 0;padding:7px 10px;background:#FEF3C7;border-radius:8px;font-size:11px;font-weight:700;color:#92400E;cursor:pointer;border:none;font-family:inherit;width:calc(100% - 16px);text-align:left}
.low-alert:hover{background:#FDE68A}
.mob-top{display:none;flex-direction:column;gap:8px;margin-bottom:10px}
.mob-cats{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.mob-cats::-webkit-scrollbar{display:none}
.mcat{padding:5px 11px;border-radius:20px;font-size:12px;font-weight:700;border:none;cursor:pointer;font-family:inherit;white-space:nowrap;background:#EDE8E1;color:#8B7E74;flex-shrink:0}
.mcat.on{background:#9B1048;color:#fff}
.mcat.ing.on{background:#16a34a;color:#fff}
.mob-acts{display:flex;gap:7px}
.mabt{flex:1;padding:9px 6px;font-size:12px;font-weight:700;border-radius:9px;border:none;cursor:pointer;font-family:inherit;text-align:center}
.fz-banner{border-radius:9px;padding:8px 13px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:700}
.srch-wrap{position:relative;margin-bottom:10px}
.srch{width:100%;padding:11px 36px 11px 40px;border-radius:10px;border:2px solid #EDE8E1;font-size:15px;font-family:inherit;outline:none;background:#F5F1EC;transition:border-color .15s}
.srch:focus{border-color:#9B1048;background:#fff}
.sic{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:#8B7E74;pointer-events:none;font-size:15px}
.sclr{position:absolute;right:11px;top:50%;transform:translateY(-50%);width:22px;height:22px;border-radius:50%;border:none;background:#C4B5A8;color:#fff;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.sclr:hover{background:#8B7E74}
.meta{font-size:11px;color:#8B7E74;margin-bottom:10px}
.pr{background:#fff;border:1px solid #EDE8E1;border-left:3px solid transparent;border-radius:10px;padding:10px 14px;cursor:pointer;margin-bottom:5px;transition:border-color .1s}
.pr:hover{border-color:#9B104844;border-left-color:transparent}
.pr.ing{border-left-color:#16a34a}
.pr.low-row{border-left-color:#D97706}
.pr.ns{opacity:.38}
.pr-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:5px}
.pname{font-size:13px;font-weight:700;line-height:1.3}
.psub{font-size:10px;color:#8B7E74;margin-top:1px}
.pills{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.pill{font-size:11px;font-weight:700;padding:6px 12px 6px 12px;border-radius:12px;white-space:nowrap;display:inline-flex;align-items:center;gap:10px;line-height:1}
.pill-info{display:flex;flex-direction:column;gap:2px}
.pill-name{font-size:10px;font-weight:600;opacity:0.7;line-height:1}
.pill-qty{font-size:22px;font-weight:800;line-height:1}
.pill-sep{opacity:0.4;font-weight:400}
.prm{width:22px;height:22px;border-radius:50%;border:none;cursor:pointer;font-size:14px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;padding:0;font-family:inherit;font-weight:800;background:rgba(0,0,0,.15);line-height:1}
.prm:hover{background:rgba(0,0,0,.28)}
.bdg{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap}
.low-bdg{background:#FEF3C7;color:#92400E;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;white-space:nowrap}
.pnote{font-size:10px;color:#8B7E74;margin-top:5px;padding:3px 8px;background:#F5F1EC;border-radius:5px;font-style:italic}
.upd-ts{font-size:10px;color:#C4B5A8;margin-top:3px}
.hr{background:#fff;border:1px solid #EDE8E1;border-radius:9px;padding:9px 12px;margin-bottom:5px}
.hbdg{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center}
.ov.show{display:flex}
.md{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:520px;max-height:85vh;overflow-y:auto;padding:16px 16px 32px}
.mhnd{width:30px;height:4px;background:#EDE8E1;border-radius:2px;margin:0 auto 13px}
.mtitle{font-size:17px;font-weight:800;margin-bottom:13px}
.lbl{font-size:10px;font-weight:700;color:#8B7E74;display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.fi{width:100%;padding:8px 11px;border-radius:8px;border:1.5px solid #EDE8E1;font-size:13px;font-family:inherit;outline:none;background:#FAF8F4;margin-bottom:10px}
.fi:focus{border-color:#9B1048}
textarea.fi{resize:none}
.fzgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:13px}
.fzo{border-radius:9px;padding:10px 6px;border:2px solid #EDE8E1;background:#fff;font-weight:700;font-size:11px;cursor:pointer;font-family:inherit;text-align:center;color:#8B7E74;transition:all .1s}
.qc{display:flex;align-items:center;gap:8px;margin-bottom:13px}
.qbtn{width:40px;height:40px;border-radius:8px;border:none;font-size:18px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center}
.qi{flex:1;text-align:center;padding:7px;border-radius:8px;border:1.5px solid #EDE8E1;font-size:20px;font-weight:800;font-family:inherit;outline:none}
.pb{width:100%;padding:12px;border-radius:10px;background:#9B1048;color:#fff;font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:inherit;margin-top:3px}
.pb:disabled{background:#ccc;cursor:not-allowed;opacity:.7}
.sb2{width:100%;padding:10px;border-radius:10px;background:#F1F5F9;color:#475569;font-size:13px;font-weight:600;border:none;cursor:pointer;font-family:inherit;margin-top:6px}
.dfz{border-radius:10px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;gap:6px}
.mini{width:30px;height:30px;border-radius:6px;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center}
.srch-list{display:flex;flex-direction:column;gap:4px;max-height:240px;overflow-y:auto;margin-bottom:6px}
.srow{padding:9px 12px;border-radius:9px;border:1.5px solid #EDE8E1;cursor:pointer;font-size:12px}
.srow:hover,.srow.on{background:#F8EEF3;border-color:#9B1048}
.imp-list{max-height:160px;overflow-y:auto;border:1px solid #EDE8E1;border-radius:7px;margin-bottom:12px}
.imp-row{font-size:11px;padding:5px 10px;border-bottom:1px solid #EDE8E1}
.warn{background:#FEF2F2;border-radius:9px;padding:11px 13px;color:#7F1D1D;font-size:12px;line-height:1.6;margin-bottom:14px}
.sec-hd{font-size:10px;font-weight:700;color:#8B7E74;margin:12px 0 6px;padding-top:10px;border-top:1px solid #EDE8E1;letter-spacing:.04em;text-transform:uppercase}
.tag{padding:5px 10px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;border:1.5px solid #EDE8E1;background:#fff;color:#8B7E74}
.tag.on{background:#F8EEF3;color:#9B1048;border-color:#9B1048}
.ver{font-size:10px;color:#C4B5A8;text-align:center;padding:12px 8px 4px}
@media(max-width:640px){
  .sb{display:none!important}
  .mob-top{display:flex!important}
  .mn{padding:10px 12px 16px}
  .hdr{padding:10px 14px}
  .pname{font-size:12px}
  .pr{padding:9px 11px}
}
</style>
</head>

    if(d.batchNotes)batchNotes=d.batchNotes;
    if(d.packedDates)packedDates=d.packedDates;
    lsSet("lk_s",stock);lsSet("lk_n",notes);lsSet("lk_h",hist);
    lsSet("lk_t",thresholds);lsSet("lk_u",lastUpd);
    cloudLoaded=true;
    setSyncStatus('synced','#0F766E');
  }catch(e){
    setSyncStatus('load error: '+e.message,'#9B1048');
    console.error('Cloud load failed',e);
    cloudLoaded=true;
  }
}

function manualSync(){

}
function load(){

}
function sv(){lsSet("lk_s",stock);lsSet("lk_p",prods);lsSet("lk_n",notes);lsSet("lk_h",hist);lsSet("lk_t",thresholds);lsSet("lk_u",lastUpd);syncToCloud();}

const euro=n=>`€${Number(n).toFixed(2)}`;
const fdate=ts=>new Date(ts).toLocaleDateString("en-GB",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"});
function relTime(ts){
  const d=Date.now()-ts,m=Math.floor(d/60000);
  if(m<2)return"just now";if(m<60)return`${m}m ago`;
  const h=Math.floor(m/60);if(h<24)return`${h}h ago`;
  const dy=Math.floor(h/24);if(dy===1)return"yesterday";if(dy<7)return`${dy}d ago`;
  return new Date(ts).toLocaleDateString("en-GB",{day:"2-digit",month:"short"});
}
const gq=(pid,fid)=>stock[pid]?.[fid]??0;
const gt=pid=>Object.values(stock[pid]??{}).reduce((a,b)=>a+b,0);
const dynCats=()=>[...new Set(prods.map(p=>p.c))];
const totVal=()=>{let v=0;for(const[pid,f]of Object.entries(stock)){const pr=prods.find(x=>x.id===pid);if(pr?.p)v+=Object.values(f).reduce((a,b)=>a+b,0)*pr.p;}return v;};
const fzItems=fid=>Object.entries(stock).filter(([,f])=>(f[fid]??0)>0).length;
const isLow=pid=>{const t=thresholds[pid];return t>0&&gt(pid)>0&&gt(pid)<=t;};
const lowCount=()=>prods.filter(p=>isLow(p.id)).length;

function addLog(type,pname,qty,from,to){if(!Array.isArray(hist))hist=[];hist.unshift({id:Date.now(),type,pname:pname||"",qty:qty||0,from:from||"",to:to||"",ts:Date.now()});hist=hist.slice(0,300);}

function setQ(pid,fid,qty){
  const old=gq(pid,fid);
  if(!stock[pid])stock[pid]={};
  if(qty<=0)delete stock[pid][fid];else stock[pid][fid]=qty;
  if(!Object.keys(stock[pid]??{}).length)delete stock[pid];
  const d=qty-old;
  if(d!==0){const pr=prods.find(p=>p.id===pid);addLog(d>0?'add':'remove',pr?.name,Math.abs(d),FZ.find(f=>f.id===fid)?.n,null);lastUpd[pid]=Date.now();}
  sv();draw();if(modal?.pid===pid)openDetail(pid);
}
const bnKey=(pid,fid)=>`${pid}__${fid}`;
const getBN=(pid,fid)=>batchNotes[bnKey(pid,fid)]||'';
const getPD=(pid,fid)=>packedDates[bnKey(pid,fid)]||'';

function addS(pid,fid,qty,note,date){
  if(!stock[pid])stock[pid]={};stock[pid][fid]=(stock[pid][fid]??0)+qty;
  const pr=prods.find(p=>p.id===pid);addLog('add',pr?.name,qty,FZ.find(f=>f.id===fid)?.n,null);
  lastUpd[pid]=Date.now();
  const k=bnKey(pid,fid);
  if(note)batchNotes[k]=note;
  if(date)packedDates[k]=date;
  sv();closeM();draw();
}
function doTx(pid,from,to,qty){
  const av=gq(pid,from);const act=Math.min(qty,av);if(!act)return;
  if(!stock[pid])stock[pid]={};
  stock[pid][from]=(stock[pid][from]??0)-act;if(stock[pid][from]<=0)delete stock[pid][from];
  stock[pid][to]=(stock[pid][to]??0)+act;
  if(!Object.keys(stock[pid]??{}).length)delete stock[pid];
  const pr=prods.find(p=>p.id===pid);addLog('transfer',pr?.name,act,FZ.find(f=>f.id===from)?.n,FZ.find(f=>f.id===to)?.n);
  lastUpd[pid]=Date.now();sv();closeM();draw();
}
function zeroP(pid){const pr=prods.find(p=>p.id===pid);addLog('purge',pr?.name,gt(pid),'all',null);delete stock[pid];sv();closeM();draw();}
function purgeAll(){addLog('purge','All products',0,'all',null);stock={};sv();closeM();draw();}
function setNote(pid,v){notes[pid]=v;sv();}
function setThreshold(pid,v){const n=parseInt(v)||0;if(n<=0)delete thresholds[pid];else thresholds[pid]=n;sv();}
function importP(arr){
  const ids=new Set(prods.map(p=>p.id));const add=arr.filter(p=>!ids.has(p.id));
  prods=[...prods,...add];if(add.length)addLog('import',add.length+' products',add.length,null,null);
  sv();closeM();draw();
}
function exportCSV(){
  const rows=[['ID','Name','Category',...FZ.map(f=>f.n),'Total','Value (€)']];
  for(const p of prods){const tot=gt(p.id);if(!tot)continue;rows.push([p.id,p.name,p.c,...FZ.map(f=>gq(p.id,f.id)),tot,p.p>0?(tot*p.p).toFixed(2):0]);}
  const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  a.href=url;a.download=`stock_${new Date().toISOString().slice(0,10)}.csv`;a.click();URL.revokeObjectURL(url);
}

function drawMain(){
  document.getElementById('totval').textContent=euro(totVal());

  }else{

  h+=`</div><div class="mob-acts"><button class="mabt" style="background:#9B1048;color:#fff" onclick="openAdd()">+ Add Stock</button><button class="mabt" style="background:#0F766E;color:#fff" onclick="exportCSV()">Export</button><button class="mabt" style="background:#FEF2F2;color:#991B1B" onclick="openPurge()">Reset</button></div></div>`;

  h+=`<div class="srch-wrap"><span class="sic">🔍</span><input class="srch" id="si" placeholder="Search for a product..." value="${uiSrch.replace(/"/g,'&quot;')}" oninput="uiSrch=this.value;drawMain()">${uiSrch?`<button class="sclr" onclick="uiSrch='';drawMain()" title="Clear search">×</button>`:''}</div>`;
  if(uiFz){const units=Object.values(stock).reduce((s,fz)=>s+(fz[uiFz]??0),0);h+=`<div class="meta"><strong>${inStock.length} products</strong> · <strong>${units} units</strong> in ${FZ.find(x=>x.id===uiFz)?.n}</div>`;}
  else if(s||uiCat!=='All'){const totalUnits=inStock.reduce((s,p)=>s+gt(p.id),0);h+=`<div class="meta">${inStock.length+noStock.length} results · <strong>${inStock.length} products in stock</strong> · ${totalUnits} units</div>`;}
  else{const totalUnits=inStock.reduce((s,p)=>s+gt(p.id),0);h+=`<div class="meta"><strong>${inStock.length} products in stock</strong> · <strong>${totalUnits} units total</strong> · ${prods.length} products in catalogue</div>`;}

function prow(p,ns){
  const cc=CC[p.c]||{bg:'#F3F4F6',tc:'#374151'};
  const ing=ING.has(p.c),tot=gt(p.id),nt=notes[p.id],low=isLow(p.id),lu=lastUpd[p.id];
  let cls='pr';if(ing)cls+=' ing';else if(low)cls+=' low-row';if(ns)cls+=' ns';
  let h=`<div class="${cls}" onclick="openDetail('${p.id}')">`;
  h+=`<div class="pr-top"><div><div class="pname">${p.name}</div>`;
  if(p.d||p.p>0)h+=`<div class="psub">${p.d}${p.p>0?` · ${euro(p.p)}/unit`:''}</div>`;
  h+=`</div><div style="display:flex;gap:5px;align-items:center;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end">`;
  if(low)h+=`<span class="low-bdg">⚠ Low</span>`;
  h+=`<span class="bdg" style="background:${cc.bg};color:${cc.tc}">${p.c}</span>`;
  if(tot>0)h+=`<span style="font-size:11px;font-weight:800;white-space:nowrap">${tot} total</span>`;
  h+=`</div></div>`;
  if(!ns&&tot>0){
    h+=`<div class="pills">`;
    const fzShow=uiFz?FZ.filter(f=>f.id===uiFz):FZ;
    for(const f of fzShow){const q=gq(p.id,f.id);if(!q)continue;h+=`<span class="pill" style="background:${f.bg};color:${f.dk}"><span class="pill-info"><span class="pill-name">${f.n}</span><span class="pill-qty">${q}</span></span><button class="prm" onclick="event.stopPropagation();setQ('${p.id}',${f.id},${q-1})" style="color:${f.dk}" title="Remove 1">−</button></span>`;}
    h+=`</div>`;
    const fzShow2=uiFz?FZ.filter(f=>f.id===uiFz):FZ;
    const batchLines=fzShow2.filter(f=>gq(p.id,f.id)>0&&(getBN(p.id,f.id)||getPD(p.id,f.id)));
    for(const f of batchLines){
      const bn=getBN(p.id,f.id);const pd=getPD(p.id,f.id);
      const parts=[];if(pd)parts.push(`Packed ${pd}`);if(bn)parts.push(bn);
      if(parts.length)h+=`<div style="font-size:10px;color:${f.dk};margin-top:3px;padding:2px 7px;background:${f.bg};border-radius:5px;display:inline-block">${f.n}: ${parts.join(' · ')}</div> `;
    }
  }else if(ns){h+=`<div style="font-size:11px;color:#8B7E74;font-style:italic">Not in stock — click to add</div>`;}
  if(nt)h+=`<div class="pnote">${nt}</div>`;
  if(lu&&tot>0)h+=`<div class="upd-ts">Updated ${relTime(lu)}</div>`;
  h+=`</div>`;return h;
}

function drawHist(){

let stIdx=0;let stList=[];
function startStocktake(){
  stList=prods.filter(p=>gt(p.id)>0).sort((a,b)=>a.name.localeCompare(b.name));
  if(!stList.length){alert('No items in stock to count.');return;}
  stIdx=0;openStocktake();
}
function openStocktake(){
  const p=stList[stIdx];if(!p)return closeM();
  const tot=gt(p.id);const cc=CC[p.c]||{bg:'#F3F4F6',tc:'#374151'};
  let h=`<div class="mhnd"></div>`;
  h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">`;
  h+=`<div style="font-size:11px;color:#8B7E74">Stock-take · ${stIdx+1} of ${stList.length}</div>`;
  h+=`<button onclick="closeM()" style="background:none;border:none;cursor:pointer;font-size:20px;color:#8B7E74;line-height:1">×</button>`;
  h+=`</div>`;
  h+=`<div style="background:#F5F1EC;border-radius:8px;height:4px;margin-bottom:14px"><div style="background:#9B1048;height:4px;border-radius:8px;width:${Math.round(((stIdx+1)/stList.length)*100)}%"></div></div>`;
  h+=`<div class="mtitle">${p.name}</div>`;
  h+=`<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:14px;font-size:11px;color:#8B7E74">${p.d} · <span class="bdg" style="background:${cc.bg};color:${cc.tc}">${p.c}</span> · <strong>${tot} recorded</strong></div>`;
  for(const f of FZ){
    const q=gq(p.id,f.id);if(!q)continue;
    h+=`<div style="background:${f.bg};border-radius:10px;padding:10px 14px;margin-bottom:8px;border:1.5px solid ${f.col}">`;
    h+=`<div style="font-size:11px;font-weight:700;color:${f.dk};margin-bottom:8px">${f.n} — recorded: <strong>${q}</strong></div>`;
    h+=`<div style="display:flex;align-items:center;gap:8px">`;
    h+=`<button onclick="stAdjust('${p.id}',${f.id},-1)" style="width:48px;height:48px;border-radius:10px;border:none;background:rgba(0,0,0,.1);font-size:24px;font-weight:700;cursor:pointer;color:${f.dk};font-family:inherit;display:flex;align-items:center;justify-content:center">−</button>`;
    h+=`<input id="stq_${f.id}" type="number" value="${q}" min="0" style="flex:1;text-align:center;padding:10px;border-radius:10px;border:2px solid ${f.col};font-size:24px;font-weight:800;font-family:inherit;outline:none;background:#fff">`;
    h+=`<button onclick="stAdjust('${p.id}',${f.id},1)" style="width:48px;height:48px;border-radius:10px;border:none;background:${f.col};font-size:24px;font-weight:700;cursor:pointer;color:#fff;font-family:inherit;display:flex;align-items:center;justify-content:center">+</button>`;
    h+=`</div></div>`;
  }
  h+=`<button onclick="stSave('${p.id}')" style="margin-top:8px;width:100%;padding:12px;border-radius:10px;background:#0F766E;color:#fff;font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:inherit">Save & Next →</button>`;
  if(stIdx>0)h+=`<button class="sb2" onclick="stIdx--;openStocktake()">← Previous</button>`;
  showM(h);
}
function stAdjust(pid,fid,delta){
  const inp=document.getElementById(`stq_${fid}`);
  if(inp)inp.value=Math.max(0,parseInt(inp.value||0)+delta);
}
function stSave(pid){
  FZ.forEach(f=>{
    const inp=document.getElementById(`stq_${f.id}`);
    if(inp){const v=parseInt(inp.value)||0;if(v!==gq(pid,f.id))setQ(pid,f.id,v);}
  });
  stIdx++;
  if(stIdx>=stList.length){closeM();alert(`Stock-take complete! ${stList.length} items reviewed.`);}
  else openStocktake();
}

function showM(html){document.getElementById('md').innerHTML=html;document.getElementById('ov').classList.add('show');}
function closeM(){modal=null;document.getElementById('ov').classList.remove('show');}
document.getElementById('ov').addEventListener('click',function(e){if(e.target===this)closeM();});

function openDetail(pid){

function handleCSV(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    const lines=ev.target.result.trim().split(/\r?\n/),res=[];
    for(let i=1;i<lines.length;i++){const cols=[];let cur='',q=false;for(const ch of lines[i]){if(ch==='"')q=!q;else if(ch===','&&!q){cols.push(cur.trim());cur='';}else cur+=ch;}cols.push(cur.trim());if(cols.length>=2&&cols[1])res.push({id:cols[0]||'i'+i,name:cols[1],d:cols[2]||'',c:cols[3]||'Other',p:parseFloat(cols[4])||0});}
    if(!res.length){document.getElementById('imprev').innerHTML=`<div style="color:#991B1B;font-size:12px;padding:8px;background:#FEF2F2;border-radius:7px">No valid rows found.</div>`;return;}
    let h=`<div style="font-size:11px;font-weight:700;color:#8B7E74;margin-bottom:6px">${res.length} products found</div><div class="imp-list">`;
    for(const p of res.slice(0,12))h+=`<div class="imp-row"><strong>${p.name}</strong> <span style="color:#8B7E74">· ${p.c}${p.p>0?` · ${euro(p.p)}`:''}</span></div>`;
    if(res.length>12)h+=`<div style="font-size:10px;color:#8B7E74;padding:5px 10px">...and ${res.length-12} more</div>`;
    h+=`</div><button class="pb" onclick='importP(${JSON.stringify(res)})'>Import ${res.length} Products</button>`;
    document.getElementById('imprev').innerHTML=h;
  };r.readAsText(f);
}

  } else {
    h+=`<div class="meta"><strong>${list.length} recipes</strong>${s?` matching "${recSrch}"`:` · ${recipes.length} total · tap to expand`}</div>`;

      for(const ing of r.ingredients){
        const matchProd=prods.find(p=>p.name.toLowerCase()===ing.item.toLowerCase());
        const stockQty=matchProd?gt(matchProd.id):0;
        const inCat=!!matchProd;
        const qtyVal=parseFloat(ing.qty);
        const qtyStr=isNaN(qtyVal)?String(ing.qty):(qtyVal%1===0?qtyVal.toString():qtyVal.toFixed(3).replace(/\.?0+$/,''));
        const dotCol=stockQty>0?'#0E9F6E':inCat?'#D97706':'#EDE8E1';
        const dotTitle=stockQty>0?`In stock: ${stockQty} units`:inCat?'In catalogue — not in stock':'Not tracked';
        h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid #F5F1EC">`;
        h+=`<span style="font-size:12px;color:#1C1511;display:flex;align-items:center;gap:6px;flex:1;min-width:0">`;
        h+=`<span style="width:8px;height:8px;border-radius:50%;background:${dotCol};flex-shrink:0;display:inline-block" title="${dotTitle}"></span>`;
        h+=`<span>${ing.item}${stockQty>0?` <span style="font-size:10px;color:#0E9F6E;font-weight:700">(${stockQty})</span>`:''}</span>`;
        h+=`</span>`;
        h+=`<span style="font-size:12px;font-weight:700;color:#8B7E74;white-space:nowrap;margin-left:12px">${qtyStr}${ing.unit?' '+ing.unit:''}</span>`;
        h+=`</div>`;
      }
      h+=`</div></div>`;
    }
  }
  el.innerHTML=h;
}
function toggleRecipe(id){const el=document.getElementById(id);if(el)el.style.display=el.style.display==='none'?'block':'none';}

function parseXLSXtoRecipes(data){
  const wb=XLSX.read(data,{type:'array'});
  const ws=wb.Sheets[wb.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
  if(!rows.length)throw new Error('Empty spreadsheet');
  const header=rows[0];
  const result=[];
  for(let col=3;col<header.length;col++){
    const recipeName=header[col];
    if(!recipeName)continue;
    const ingredients=[];
    for(let row=1;row<rows.length;row++){
      const ingName=rows[row][0];
      const unit=rows[row][1]||'';
      const qty=rows[row][col];
      if(ingName&&qty!==null&&qty!==''&&qty!==0){
        const qtyNum=parseFloat(qty);
        if(!isNaN(qtyNum)&&qtyNum>0){
          ingredients.push({item:String(ingName),unit:String(unit),qty:Math.round(qtyNum*1000)/1000});
        }
      }
    }
    if(ingredients.length)result.push({name:String(recipeName),ingredients});
  }
  return result;
}

function loadRecipeFile(inp){
  const f=inp.files[0];if(!f)return;
  const ext=f.name.split('.').pop().toLowerCase();
  const r=new FileReader();
  if(ext==='xlsx'){
    r.onload=ev=>{
      try{
        const data=new Uint8Array(ev.target.result);
        if(typeof XLSX==='undefined')throw new Error('Excel reader not loaded yet — please try again in a moment');
        recipes=parseXLSXtoRecipes(data);
        recSrch='';drawRecipes();
      }catch(e){alert('Could not read Excel file:\n'+e.message);}
    };
    r.readAsArrayBuffer(f);
  }else{
    r.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(!Array.isArray(data))throw new Error('Expected a JSON array');
        recipes=data;recSrch='';
        const ri=document.getElementById('ri');if(ri)ri.value='';
        drawRecipeResults();
      }catch(e){alert('Could not load file:\n'+e.message);}
    };
    r.readAsText(f);
  }
  inp.value='';
}

load();
